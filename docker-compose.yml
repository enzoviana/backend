version: '3.8'

services:
  # Backend Node.js
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dimotec-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Variables d'environnement (à configurer selon vos besoins)
      - NODE_ENV=production
      - PORT=3000
      - MONGO_LIVE=mongodb://mongo:27017/diag_platform
      # Ajoutez vos autres variables d'environnement ici
      # ou utilisez un fichier .env avec env_file
    env_file:
      - .env
    depends_on:
      - mongo
    networks:
      - dimotec-network
    volumes:
      # Optionnel: pour persister les logs ou uploads
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Base de données MongoDB
  mongo:
    image: mongo:7
    container_name: dimotec-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=diag_platform
    volumes:
      # Persister les données MongoDB
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    networks:
      - dimotec-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongo-data:
    driver: local
  mongo-config:
    driver: local

networks:
  dimotec-network:
    driver: bridge

version: '3.8'

services:
  # Backend Node.js
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dimotec-backend
    restart: unless-stopped
    ports:
      - "${PORT}:${PORT}" # 💡 Dynamique : utilise le PORT défini dans ton .env (ex: 3000:3000)
    env_file:
      - .env # 🟩 Charge TOUTES les variables de ton .env (y compris MONGO_LIVE, STRIPE, etc.)
    environment:
      - NODE_ENV=production # On garde uniquement ce qui est propre à l'exécution Docker
    depends_on:
      mongo:
        condition: service_healthy # 💡 Plus robuste : attend que MongoDB soit VRAIMENT prêt (grâce au healthcheck)
    networks:
      - dimotec-network
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${PORT}/"] # 💡 Dynamique aussi
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Base de données MongoDB
  mongo:
    image: mongo:7
    container_name: dimotec-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=diag_platform
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    networks:
      - dimotec-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongo-data:
    driver: local
  mongo-config:
    driver: local

networks:
  dimotec-network:
    driver: bridge